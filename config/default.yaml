# Video Downloader Configuration

download:
  # Default download directory
  default_dir: "~/Downloads"
  # Default number of threads
  default_threads: 8
  # Default output format (mp4, mkv, original)
  default_format: "mp4"
  # Maximum concurrent downloads
  max_concurrent: 3
  # Retry count on failure
  retry_count: 3
  # Timeout in seconds
  timeout: 30

headers:
  # Default User-Agent
  default_user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  # Auto set Referer from URL
  auto_referer: true
  # Default custom headers
  default_headers: {}

tools:
  # Tool download URLs
  n_m3u8dl_re_url: "https://github.com/nilaoda/N_m3u8DL-RE/releases/latest/download/N_m3u8DL-RE.exe"
  yt_dlp_url: "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"
  aria2_url: "https://github.com/aria2/aria2/releases/latest/download/aria2-1.37.0-win-64bit-build1.zip"
  # Custom FFmpeg path (leave empty to auto-detect)
  ffmpeg_path: ""
  # Auto update tools when new version available
  auto_update_tools: true

history:
  # Maximum number of history records to keep
  max_records: 100
  # History file path
  save_path: "~/.video_downloader/history.json"

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Log file path
  file: "~/.video_downloader/download.log"